<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GeoP2P — все на карте</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { width: 100%; height: 75%; }
        .panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            min-width: 260px;
            z-index: 1000;
            border: 1px solid rgba(0,0,0,0.1);
            max-height: 80%;
            overflow-y: auto;
        }
        .panel h3 { margin: 0 0 10px 0; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .user-list { list-style: none; max-height: 250px; overflow-y: auto; margin: 10px 0; padding: 0; }
        .user-list li { padding: 6px 8px; margin-bottom: 4px; background: #f5f5f5; border-radius: 8px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .user-list .you { background: #e8f5e9; border-left: 3px solid #4caf50; }
        .online-count { background: #4caf50; color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; }
        input, button { width: 100%; padding: 8px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
        button { background: #4caf50; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #45a049; }
        button.secondary { background: #2196f3; }
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 1000;
            font-family: monospace;
        }
        .badge { width: 10px; height: 10px; border-radius: 10px; display: inline-block; }
        .coords { font-size: 10px; color: #666; margin-top: 4px; text-align: center; }
        .share-panel {
            background: #f0f8ff;
            border-radius: 8px;
            padding: 8px;
            margin-top: 8px;
            text-align: center;
        }
        .share-link {
            font-size: 11px;
            color: #2196f3;
            cursor: pointer;
            text-decoration: underline;
            word-break: break-all;
        }
    </style>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=aff39fed-8ca3-47e1-978f-070535e0ea3a&lang=ru_RU"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="map"></div>
    
    <div class="panel">
        <h3>
            🌍 В сети
            <span id="userCount" class="online-count">0</span>
        </h3>
        
        <div>
            <input type="text" id="userName" placeholder="Ваше имя" maxlength="20">
            <button id="shareLocationBtn" style="background:#2196f3;">📍 Отправить мои координаты</button>
            <button id="autoShareBtn" style="background:#ff9800;">🔄 Авто-отправка (вкл)</button>
        </div>
        
        <div class="share-panel">
            📢 <strong>Пригласите друзей!</strong><br>
            <span id="pageLink" class="share-link">Загрузка ссылки...</span>
            <span id="copyLinkBtn" class="share-link" style="margin-left:8px;">(копировать)</span>
            <div style="font-size:10px; margin-top:4px;">Все, кто откроет эту ссылку, увидят друг друга</div>
        </div>
        
        <ul id="userList" class="user-list">
            <li style="text-align:center; color:#999;">⏳ Загрузка...</li>
        </ul>
        
        <div id="myCoordsDisplay" class="coords" style="text-align:center; margin-top:8px;">
            ⏳ Определение местоположения...
        </div>
        
        <div style="font-size: 10px; color: #888; margin-top: 10px; text-align: center;">
            ⚡ P2P | Данные идут напрямую между браузерами<br>
            🌐 Без серверов, без комнат, без регистрации
        </div>
    </div>
    <div class="status" id="status">
        🔌 Подключение к сети...
    </div>

    <script>
        // ============== ГЛОБАЛЬНАЯ P2P СЕТЬ (без комнат) ==============
        let peer = null;
        let connections = new Map();      // peerId -> DataConnection
        let remoteUsers = new Map();       // peerId -> { name, lat, lng, lastSeen }
        let myPeerId = null;
        let myLocation = null;
        let myName = 'User_' + Math.floor(Math.random() * 1000);
        let autoShareInterval = null;
        let reconnectAttempts = 0;
        
        // Карта
        let myMap = null;
        let myOwnPlacemark = null;
        let remotePlacemarks = new Map();
        
        // Уникальный ID для глобальной сети (один для всех)
        const GLOBAL_NETWORK_ID = 'geo-p2p-global-network-v1';
        
        // Инициализация карты
        function initMap(centerLat, centerLng) {
            if (myMap) return;
            myMap = new ymaps.Map("map", {
                center: [centerLat, centerLng],
                zoom: 14,
                controls: ['zoomControl', 'fullscreenControl', 'geolocationControl']
            });
            
            if (myLocation) {
                addMyPlacemark();
            }
        }
        
        // Своя метка
        function addMyPlacemark() {
            if (!myMap || !myLocation) return;
            
            if (myOwnPlacemark) {
                myOwnPlacemark.geometry.setCoordinates([myLocation.lat, myLocation.lng]);
            } else {
                myOwnPlacemark = new ymaps.Placemark(
                    [myLocation.lat, myLocation.lng],
                    {
                        hintContent: `${myName} (вы)`,
                        balloonContent: `<strong>${myName}</strong><br>📍 Это вы!<br>Координаты: ${myLocation.lat.toFixed(5)}, ${myLocation.lng.toFixed(5)}`
                    },
                    {
                        preset: 'islands#greenCircleIcon',
                        iconColor: '#4caf50'
                    }
                );
                myMap.geoObjects.add(myOwnPlacemark);
            }
            
            myMap.setCenter([myLocation.lat, myLocation.lng], 14);
            document.getElementById('myCoordsDisplay').innerHTML = `📍 Вы: ${myLocation.lat.toFixed(5)}, ${myLocation.lng.toFixed(5)}`;
        }
        
        // Метки других пользователей
        function updateRemoteMarkers() {
            if (!myMap) return;
            
            for (let [id, marker] of remotePlacemarks) {
                if (!remoteUsers.has(id)) {
                    myMap.geoObjects.remove(marker);
                    remotePlacemarks.delete(id);
                }
            }
            
            for (let [id, user] of remoteUsers) {
                if (user.lat && user.lng) {
                    if (remotePlacemarks.has(id)) {
                        remotePlacemarks.get(id).geometry.setCoordinates([user.lat, user.lng]);
                    } else {
                        const placemark = new ymaps.Placemark(
                            [user.lat, user.lng],
                            {
                                hintContent: user.name,
                                balloonContent: `${user.name}<br>📍 ${user.lat.toFixed(5)}, ${user.lng.toFixed(5)}<br>🕐 ${Math.floor((Date.now() - (user.lastSeen || Date.now()))/1000)} сек назад`
                            },
                            { preset: 'islands#blueCircleIcon' }
                        );
                        myMap.geoObjects.add(placemark);
                        remotePlacemarks.set(id, placemark);
                    }
                }
            }
            
            updateUserList();
        }
        
        // Список пользователей
        function updateUserList() {
            const userListEl = document.getElementById('userList');
            const userCountEl = document.getElementById('userCount');
            const users = Array.from(remoteUsers.values()).filter(u => u.id !== myPeerId);
            const onlineCount = users.length + (myLocation ? 1 : 0);
            userCountEl.textContent = onlineCount;
            
            if (users.length === 0 && !myLocation) {
                userListEl.innerHTML = '<li style="text-align:center; color:#999;">🌐 Никого нет, пригласите друзей!</li>';
                return;
            }
            
            let html = '';
            if (myLocation) {
                html += `<li class="you">
                    <span class="badge" style="background:#4caf50;"></span>
                    <strong>${myName}</strong> (вы)
                    <span style="font-size:10px; margin-left:auto;">📍 ${myLocation.lat.toFixed(4)}, ${myLocation.lng.toFixed(4)}</span>
                </li>`;
            }
            
            users.forEach(u => {
                const secondsAgo = u.lastSeen ? Math.floor((Date.now() - u.lastSeen) / 1000) : 0;
                html += `<li>
                    <span class="badge" style="background:#2196f3;"></span>
                    <strong>${u.name}</strong>
                    <span style="font-size:10px; margin-left:auto;">🕐 ${secondsAgo}с назад</span>
                </li>`;
            });
            userListEl.innerHTML = html;
        }
        
        // Отправка координат всем
        function broadcastLocation() {
            if (!myLocation) {
                alert('Сначала определите местоположение');
                return;
            }
            
            const data = {
                type: 'location',
                lat: myLocation.lat,
                lng: myLocation.lng,
                name: myName,
                timestamp: Date.now()
            };
            
            let sent = 0;
            for (let [peerId, conn] of connections) {
                if (conn.open) {
                    conn.send(data);
                    sent++;
                }
            }
            
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `✅ Координаты отправлены (${sent} пользователей)`;
            setTimeout(() => {
                statusEl.innerHTML = `🟢 В сети: ${connections.size} подключений | ${remoteUsers.size} пользователей`;
            }, 2000);
        }
        
        // Автоотправка
        function toggleAutoShare() {
            if (autoShareInterval) {
                clearInterval(autoShareInterval);
                autoShareInterval = null;
                document.getElementById('autoShareBtn').style.background = '#ff9800';
                document.getElementById('autoShareBtn').innerHTML = '🔄 Авто-отправка (вкл)';
                document.getElementById('status').innerHTML = '⏸ Авто-отправка отключена';
            } else {
                autoShareInterval = setInterval(() => {
                    if (myLocation && connections.size > 0) {
                        broadcastLocation();
                    }
                }, 10000);
                document.getElementById('autoShareBtn').style.background = '#f44336';
                document.getElementById('autoShareBtn').innerHTML = '⏸ Авто-отправка (выкл)';
                document.getElementById('status').innerHTML = '🔄 Авто-отправка активна (каждые 10 сек)';
            }
        }
        
        // Настройка соединения с другим пиром
        function setupConnection(conn) {
            const peerId = conn.peer;
            if (connections.has(peerId)) return;
            
            connections.set(peerId, conn);
            
            conn.on('open', () => {
                console.log('Соединение с', peerId);
                document.getElementById('status').innerHTML = `🟢 В сети: ${connections.size} подключений`;
                
                if (myLocation) {
                    conn.send({
                        type: 'location',
                        lat: myLocation.lat,
                        lng: myLocation.lng,
                        name: myName,
                        timestamp: Date.now()
                    });
                }
            });
            
            conn.on('data', (data) => {
                if (data.type === 'location') {
                    remoteUsers.set(peerId, {
                        id: peerId,
                        name: data.name || peerId.slice(0, 8),
                        lat: data.lat,
                        lng: data.lng,
                        lastSeen: data.timestamp || Date.now()
                    });
                    updateRemoteMarkers();
                }
            });
            
            conn.on('close', () => {
                connections.delete(peerId);
                remoteUsers.delete(peerId);
                updateRemoteMarkers();
                document.getElementById('status').innerHTML = `🟡 Пользователь отключился | В сети: ${connections.size}`;
            });
            
            conn.on('error', (err) => {
                console.error('Ошибка соединения:', err);
                connections.delete(peerId);
                remoteUsers.delete(peerId);
            });
        }
        
        // Подключение к глобальной сети
        function connectToGlobalNetwork() {
            if (peer) {
                for (let [id, conn] of connections) {
                    conn.close();
                }
                connections.clear();
                remoteUsers.clear();
                peer.destroy();
            }
            
            myName = document.getElementById('userName').value.trim() || myName;
            
            // Генерируем уникальный ID для этого клиента
            const clientId = GLOBAL_NETWORK_ID + '_' + Math.random().toString(36).substr(2, 8);
            peer = new Peer(clientId, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' }
                    ]
                }
            });
            
            myPeerId = clientId;
            
            peer.on('open', () => {
                console.log('Подключён к глобальной сети:', clientId);
                document.getElementById('status').innerHTML = `🟢 Подключён к сети | Ваш ID: ${clientId.slice(-6)}`;
                
                // Получаем список всех пиров из localStorage (глобальный)
                let allPeers = JSON.parse(localStorage.getItem(GLOBAL_NETWORK_ID + '_peers') || '[]');
                
                // Подключаемся ко всем существующим пирам
                allPeers.forEach(existingPeerId => {
                    if (existingPeerId !== clientId && !connections.has(existingPeerId)) {
                        const conn = peer.connect(existingPeerId);
                        setupConnection(conn);
                    }
                });
                
                // Добавляем себя в список
                const updatedPeers = [...new Set([...allPeers, clientId])];
                localStorage.setItem(GLOBAL_NETWORK_ID + '_peers', JSON.stringify(updatedPeers));
                
                // Очищаем при закрытии
                window.addEventListener('beforeunload', () => {
                    const currentPeers = JSON.parse(localStorage.getItem(GLOBAL_NETWORK_ID + '_peers') || '[]');
                    const filtered = currentPeers.filter(p => p !== clientId);
                    localStorage.setItem(GLOBAL_NETWORK_ID + '_peers', JSON.stringify(filtered));
                });
            });
            
            peer.on('connection', (conn) => {
                setupConnection(conn);
            });
            
            peer.on('error', (err) => {
                console.error('PeerJS ошибка:', err);
                document.getElementById('status').innerHTML = `❌ Ошибка: ${err.type}. Переподключение...`;
                
                // Автоматическое переподключение через 3 секунды
                setTimeout(() => {
                    if (reconnectAttempts < 5) {
                        reconnectAttempts++;
                        connectToGlobalNetwork();
                    }
                }, 3000);
            });
        }
        
        // Геолокация
        function getMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        myLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        
                        if (!myMap) {
                            initMap(myLocation.lat, myLocation.lng);
                        }
                        addMyPlacemark();
                        
                        document.getElementById('status').innerHTML = `📍 Мои координаты: ${myLocation.lat.toFixed(5)}, ${myLocation.lng.toFixed(5)}`;
                        broadcastLocation();
                    },
                    (err) => {
                        console.error('Геолокация:', err);
                        const defaultCoords = { lat: 56.838011, lng: 60.597465 };
                        myLocation = defaultCoords;
                        if (!myMap) initMap(myLocation.lat, myLocation.lng);
                        addMyPlacemark();
                        document.getElementById('status').innerHTML = `⚠️ Геолокация недоступна, центр Екатеринбурга`;
                        document.getElementById('myCoordsDisplay').innerHTML = `⚠️ Геолокация недоступна`;
                    }
                );
            } else {
                const defaultCoords = { lat: 56.838011, lng: 60.597465 };
                myLocation = defaultCoords;
                if (!myMap) initMap(myLocation.lat, myLocation.lng);
                addMyPlacemark();
                document.getElementById('status').innerHTML = `❌ Браузер не поддерживает геолокацию`;
            }
        }
        
        // Копирование ссылки на страницу
        function copyPageLink() {
            const link = window.location.href;
            navigator.clipboard.writeText(link);
            document.getElementById('status').innerHTML = '📋 Ссылка скопирована! Пригласите друзей!';
            setTimeout(() => {
                document.getElementById('status').innerHTML = `🟢 В сети: ${connections.size} подключений`;
            }, 2000);
        }
        
        // ========== UI ==========
        document.getElementById('shareLocationBtn').onclick = broadcastLocation;
        document.getElementById('autoShareBtn').onclick = toggleAutoShare;
        document.getElementById('copyLinkBtn').onclick = copyPageLink;
        
        // Сохранение имени
        const savedName = localStorage.getItem('userName');
        if (savedName) document.getElementById('userName').value = savedName;
        document.getElementById('userName').onchange = () => {
            localStorage.setItem('userName', document.getElementById('userName').value);
            myName = document.getElementById('userName').value || myName;
            if (myOwnPlacemark) {
                myOwnPlacemark.properties.set({ hintContent: `${myName} (вы)`, balloonContent: `<strong>${myName}</strong><br>📍 Это вы!` });
            }
        };
        
        // Отображение ссылки на страницу
        document.getElementById('pageLink').innerText = window.location.href;
        
        // Запуск
        ymaps.ready(() => {
            getMyLocation();
            connectToGlobalNetwork();
            
            // Авто-отправка включена по умолчанию
            autoShareInterval = setInterval(() => {
                if (myLocation && connections.size > 0) {
                    broadcastLocation();
                }
            }, 10000);
            document.getElementById('autoShareBtn').innerHTML = '⏸ Авто-отправка (выкл)';
            document.getElementById('autoShareBtn').style.background = '#f44336';
        });
    </script>
</body>
</html>
