<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P2P GeoMap — живые пользователи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #map {
            width: 100%;
            height: 70%;
        }
        .panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            min-width: 240px;
            z-index: 1000;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            margin: 10px 0;
            padding: 0;
        }
        .user-list li {
            padding: 6px 8px;
            margin-bottom: 4px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-list .you {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
        }
        .online-count {
            background: #4caf50;
            color: white;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
        }
        button {
            background: #4caf50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background: #45a049;
        }
        button.secondary {
            background: #2196f3;
        }
        button.danger {
            background: #ff5722;
        }
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 1000;
            font-family: monospace;
        }
        .badge {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            display: inline-block;
        }
        .room-info {
            font-size: 11px;
            background: #f0f0f0;
            padding: 6px;
            border-radius: 8px;
            margin-top: 8px;
            text-align: center;
            word-break: break-all;
        }
        .share-link {
            font-size: 10px;
            color: #2196f3;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=aff39fed-8ca3-47e1-978f-070535e0ea3a&lang=ru_RU"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="map"></div>
    
    <div class="panel">
        <h3>
            👥 Активные
            <span id="userCount" class="online-count">0</span>
        </h3>
        
        <div>
            <input type="text" id="userName" placeholder="Ваше имя" maxlength="20">
            <input type="text" id="roomName" placeholder="ID комнаты" value="geo-map-room">
            <button id="connectBtn" class="secondary">🔗 Подключиться к комнате</button>
            <button id="createRoomBtn">✨ Создать новую комнату</button>
        </div>
        
        <div id="roomInfo" class="room-info" style="display:none;">
            🔗 Ваша ссылка: <span id="roomLink"></span>
            <span id="copyLink" class="share-link">(копировать)</span>
        </div>
        
        <ul id="userList" class="user-list">
            <li style="text-align:center; color:#999;">— не подключено —</li>
        </ul>
        
        <button id="shareLocationBtn" style="background:#2196f3;">📍 Отправить мои координаты</button>
        <button id="autoShareBtn" style="background:#ff9800;">🔄 Авто-отправка (каждые 10 сек)</button>
        
        <div style="font-size: 10px; color: #888; margin-top: 10px; text-align: center;">
            ⚡ P2P | Данные идут напрямую между браузерами<br>
            🌐 Откройте эту же ссылку на другом устройстве
        </div>
    </div>
    <div class="status" id="status">
        ⚪ Не подключено
    </div>

    <script>
        // ============== P2P ЧАСТЬ (PeerJS) ==============
        let peer = null;
        let connections = new Map();      // peerId -> DataConnection
        let remoteUsers = new Map();       // peerId -> { name, lat, lng, lastSeen }
        let myPeerId = null;
        let myLocation = null;
        let myName = 'User_' + Math.floor(Math.random() * 1000);
        let currentRoom = null;
        let autoShareInterval = null;
        
        // Карта
        let myMap = null;
        let placemarks = new Map();
        
        // Инициализация карты
        function initMap(centerLat, centerLng) {
            if (myMap) return;
            myMap = new ymaps.Map("map", {
                center: [centerLat, centerLng],
                zoom: 13,
                controls: ['zoomControl', 'fullscreenControl', 'geolocationControl']
            });
        }
        
        // Обновление меток на карте
        function updateMapMarkers() {
            if (!myMap) return;
            
            // Удаляем старые метки
            for (let [id, marker] of placemarks) {
                if (id !== myPeerId && !remoteUsers.has(id)) {
                    myMap.geoObjects.remove(marker);
                    placemarks.delete(id);
                }
            }
            
            // Добавляем/обновляем метки
            for (let [id, user] of remoteUsers) {
                if (user.lat && user.lng) {
                    if (placemarks.has(id)) {
                        placemarks.get(id).geometry.setCoordinates([user.lat, user.lng]);
                    } else {
                        const isYou = (id === myPeerId);
                        const placemark = new ymaps.Placemark(
                            [user.lat, user.lng],
                            { 
                                hintContent: user.name,
                                balloonContent: `${user.name}<br>📍 ${user.lat.toFixed(5)}, ${user.lng.toFixed(5)}<br>🕐 ${Math.floor((Date.now() - (user.lastSeen || Date.now()))/1000)} сек назад`
                            },
                            { preset: isYou ? 'islands#greenCircleIcon' : 'islands#blueCircleIcon' }
                        );
                        myMap.geoObjects.add(placemark);
                        placemarks.set(id, placemark);
                    }
                }
            }
            
            // Обновляем список в панели
            updateUserList();
        }
        
        // Обновление списка пользователей
        function updateUserList() {
            const userListEl = document.getElementById('userList');
            const userCountEl = document.getElementById('userCount');
            const users = Array.from(remoteUsers.values()).filter(u => u.id !== myPeerId);
            const onlineCount = users.length + (myLocation ? 1 : 0);
            userCountEl.textContent = onlineCount;
            
            if (users.length === 0 && !myLocation) {
                userListEl.innerHTML = '<li style="text-align:center; color:#999;">— нет активных —</li>';
                return;
            }
            
            let html = '';
            if (myLocation) {
                html += `<li class="you">
                    <span class="badge" style="background:#4caf50;"></span>
                    <strong>${myName}</strong> (вы)
                    <span style="font-size:10px; margin-left:auto;">📍 ${myLocation.lat.toFixed(4)}, ${myLocation.lng.toFixed(4)}</span>
                </li>`;
            }
            
            users.forEach(u => {
                const secondsAgo = u.lastSeen ? Math.floor((Date.now() - u.lastSeen) / 1000) : 0;
                html += `<li>
                    <span class="badge" style="background:#2196f3;"></span>
                    <strong>${u.name}</strong>
                    <span style="font-size:10px; margin-left:auto;">🕐 ${secondsAgo}с назад</span>
                </li>`;
            });
            userListEl.innerHTML = html;
        }
        
        // Отправка координат всем подключённым
        function broadcastLocation() {
            if (!myLocation) {
                alert('Сначала определите местоположение');
                return;
            }
            
            const data = {
                type: 'location',
                lat: myLocation.lat,
                lng: myLocation.lng,
                name: myName,
                timestamp: Date.now()
            };
            
            let sent = 0;
            for (let [peerId, conn] of connections) {
                if (conn.open) {
                    conn.send(data);
                    sent++;
                }
            }
            
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `✅ Координаты отправлены (${sent} получателей)`;
            setTimeout(() => {
                if (currentRoom) statusEl.innerHTML = `🟢 В комнате: ${currentRoom} | ${connections.size} подключений`;
            }, 2000);
        }
        
        // Авто-отправка
        function toggleAutoShare() {
            if (autoShareInterval) {
                clearInterval(autoShareInterval);
                autoShareInterval = null;
                document.getElementById('autoShareBtn').style.background = '#ff9800';
                document.getElementById('autoShareBtn').innerHTML = '🔄 Авто-отправка (выкл)';
                document.getElementById('status').innerHTML = '⏸ Авто-отправка отключена';
            } else {
                autoShareInterval = setInterval(() => {
                    if (myLocation && connections.size > 0) {
                        broadcastLocation();
                    }
                }, 10000);
                document.getElementById('autoShareBtn').style.background = '#f44336';
                document.getElementById('autoShareBtn').innerHTML = '⏸ Авто-отправка (вкл)';
                document.getElementById('status').innerHTML = '🔄 Авто-отправка активна (каждые 10 сек)';
            }
        }
        
        // Обработка входящего соединения
        function setupConnection(conn) {
            const peerId = conn.peer;
            connections.set(peerId, conn);
            
            conn.on('open', () => {
                console.log('Соединение открыто с', peerId);
                document.getElementById('status').innerHTML = `🟢 Подключено: ${connections.size} пиров`;
                
                // Отправляем свои координаты новому пиру
                if (myLocation) {
                    conn.send({
                        type: 'location',
                        lat: myLocation.lat,
                        lng: myLocation.lng,
                        name: myName,
                        timestamp: Date.now()
                    });
                }
            });
            
            conn.on('data', (data) => {
                if (data.type === 'location') {
                    remoteUsers.set(peerId, {
                        id: peerId,
                        name: data.name || peerId.slice(0, 8),
                        lat: data.lat,
                        lng: data.lng,
                        lastSeen: data.timestamp || Date.now()
                    });
                    updateMapMarkers();
                }
            });
            
            conn.on('close', () => {
                console.log('Соединение закрыто с', peerId);
                connections.delete(peerId);
                remoteUsers.delete(peerId);
                updateMapMarkers();
                document.getElementById('status').innerHTML = `🟡 Отключился: ${peerId.slice(0, 8)} | Осталось: ${connections.size}`;
            });
        }
        
        // Подключение к комнате через PeerJS
        function connectToRoom(roomId) {
            // Отключаемся от старой комнаты
            if (peer) {
                for (let [id, conn] of connections) {
                    conn.close();
                }
                connections.clear();
                remoteUsers.clear();
                peer.destroy();
            }
            
            currentRoom = roomId;
            myName = document.getElementById('userName').value.trim() || myName;
            
            // Создаём нового пира с ID = roomId + случайный суффикс
            const peerId = roomId + '_' + Math.random().toString(36).substr(2, 6);
            peer = new Peer(peerId, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });
            
            myPeerId = peerId;
            
            peer.on('open', () => {
                console.log('Peer открыт:', peerId);
                document.getElementById('status').innerHTML = `🟢 Комната: ${roomId} | ID: ${peerId.slice(-6)}`;
                
                // Показываем ссылку для приглашения
                const roomLink = window.location.href.split('#')[0] + '#' + roomId;
                document.getElementById('roomLink').innerHTML = roomLink;
                document.getElementById('roomInfo').style.display = 'block';
                
                // Подключаемся ко всем существующим пирам в комнате
                // Для этого нужно знать ID других пиров — PeerJS не хранит список,
                // поэтому используем URL hash для передачи ID комнаты, а пиры сами находят друг друга
                // Проще: приглашаем через ссылку, и каждый новый пир подключается к уже существующим
                
                // Ищем других пиров в той же комнате через localStorage (костыль, но работает)
                const peersInRoom = JSON.parse(localStorage.getItem('peers_' + roomId) || '[]');
                peersInRoom.forEach(existingPeerId => {
                    if (existingPeerId !== peerId && !connections.has(existingPeerId)) {
                        const conn = peer.connect(existingPeerId);
                        setupConnection(conn);
                    }
                });
                
                // Добавляем себя в список
                const updatedPeers = [...new Set([...peersInRoom, peerId])];
                localStorage.setItem('peers_' + roomId, JSON.stringify(updatedPeers));
                
                // Очищаем список при закрытии
                window.addEventListener('beforeunload', () => {
                    const currentPeers = JSON.parse(localStorage.getItem('peers_' + roomId) || '[]');
                    const filtered = currentPeers.filter(p => p !== peerId);
                    localStorage.setItem('peers_' + roomId, JSON.stringify(filtered));
                });
            });
            
            peer.on('connection', (conn) => {
                setupConnection(conn);
            });
            
            peer.on('error', (err) => {
                console.error('PeerJS ошибка:', err);
                document.getElementById('status').innerHTML = `❌ Ошибка: ${err.type}`;
            });
        }
        
        // Геолокация
        function getMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        myLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        if (!myMap) initMap(myLocation.lat, myLocation.lng);
                        else myMap.setCenter([myLocation.lat, myLocation.lng]);
                        document.getElementById('status').innerHTML = `📍 Мои координаты: ${myLocation.lat.toFixed(5)}, ${myLocation.lng.toFixed(5)}`;
                        updateMapMarkers();
                        broadcastLocation();
                    },
                    (err) => {
                        console.error('Геолокация:', err);
                        initMap(56.838011, 60.597465);
                        myLocation = { lat: 56.838011, lng: 60.597465 };
                    }
                );
            }
        }
        
        // Копирование ссылки
        function copyRoomLink() {
            const link = document.getElementById('roomLink').innerText;
            navigator.clipboard.writeText(link);
            document.getElementById('status').innerHTML = '📋 Ссылка скопирована!';
            setTimeout(() => {
                if (currentRoom) document.getElementById('status').innerHTML = `🟢 В комнате: ${currentRoom}`;
            }, 1500);
        }
        
        // ========== UI ==========
        document.getElementById('connectBtn').onclick = () => {
            const room = document.getElementById('roomName').value.trim();
            if (room) connectToRoom(room);
        };
        
        document.getElementById('createRoomBtn').onclick = () => {
            const newRoom = 'room_' + Math.random().toString(36).substr(2, 8);
            document.getElementById('roomName').value = newRoom;
            connectToRoom(newRoom);
        };
        
        document.getElementById('shareLocationBtn').onclick = broadcastLocation;
        document.getElementById('autoShareBtn').onclick = toggleAutoShare;
        document.getElementById('copyLink').onclick = copyRoomLink;
        
        // Загрузка сохранённого имени
        const savedName = localStorage.getItem('userName');
        if (savedName) document.getElementById('userName').value = savedName;
        document.getElementById('userName').onchange = () => {
            localStorage.setItem('userName', document.getElementById('userName').value);
            myName = document.getElementById('userName').value || myName;
        };
        
        // Запуск по хешу URL
        ymaps.ready(() => {
            getMyLocation();
            
            const hash = window.location.hash.slice(1);
            if (hash) {
                document.getElementById('roomName').value = hash;
                setTimeout(() => connectToRoom(hash), 1000);
            }
        });
    </script>
</body>
</html>
